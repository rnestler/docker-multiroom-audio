[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:snapserver]
command=snapserver -c /etc/snapserver.conf
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true

[program:mpd]
command=mpd --no-daemon /etc/mpd.conf
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
